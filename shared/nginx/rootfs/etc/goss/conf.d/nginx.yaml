user:
    app:
        exists: true
        uid: 10000

group:
    app:
        exists: true
        gid: 10001

process:
    nginx:
        running: true

command:
    nginx -t:
        exit-status: 0

port:
    tcp:80:
        listening: true
        ip:
            - 0.0.0.0

http:
    http://localhost/nginx-health:
        status: 200
